# frozen_string_literal: true

# =============================================================================
# Tournament Fixtures
# =============================================================================

summer_league:
  name: "2024 서머 리그"
  organizer: tournament_admin
  status: registration_open
  format: single_elimination
  start_date: <%= 2.weeks.from_now.to_date %>
  end_date: <%= 4.weeks.from_now.to_date %>
  registration_start: <%= 1.week.ago.to_date %>
  registration_end: <%= 1.week.from_now.to_date %>
  team_size: 5
  min_teams: 4
  max_teams: 16
  entry_fee: 50000
  is_public: true
  description: "2024 여름 농구 대회입니다."

winter_cup:
  name: "2024 윈터컵"
  organizer: host_user
  status: draft
  format: round_robin
  start_date: <%= 1.month.from_now.to_date %>
  end_date: <%= 2.months.from_now.to_date %>
  registration_start: <%= 1.day.from_now.to_date %>
  registration_end: <%= 3.weeks.from_now.to_date %>
  team_size: 5
  min_teams: 6
  max_teams: 8
  entry_fee: 100000
  is_public: false
  description: "2024 겨울 농구 대회입니다."

completed_tournament:
  name: "2023 가을 대회"
  organizer: tournament_admin
  status: completed
  format: single_elimination
  start_date: <%= 2.months.ago.to_date %>
  end_date: <%= 1.month.ago.to_date %>
  registration_start: <%= 3.months.ago.to_date %>
  registration_end: <%= 2.months.ago.to_date - 1.day %>
  team_size: 5
  min_teams: 4
  max_teams: 8
  entry_fee: 30000
  is_public: true
  description: "완료된 대회입니다."
